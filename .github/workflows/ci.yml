name: frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # pnpm 11 requires Node >= 22.13. This also matches the Node the server runs (installed user-local
  # via nvm, so the neighbouring app keeps the Node 20 it was tested on).
  NODE_VERSION: "22"

jobs:
  test:
    name: lint · typecheck · unit · bench
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Fail loudly, at the start, rather than shipping a bundle that points at nowhere. A missing
      # NEXT_PUBLIC_* is invisible: the build succeeds, the app deploys, and every API call goes to the
      # empty origin. This is the cheapest possible place to catch that.
      - name: Require NEXT_PUBLIC_API_URL
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_API_URL }}" ]; then
            echo "NEXT_PUBLIC_API_URL is not set. It is baked into the client bundle at build time —"
            echo "an empty value produces a green build that ships an app which cannot reach the API."
            exit 1
          fi

      - run: pnpm lint
      - run: pnpm typecheck

      # The CRDT convergence fuzz test lives here: 500 generated histories × up to 5 replicas × random
      # delivery orders × duplicates, asserting byte-identical state. If it fails, the merge algorithm is
      # wrong and the merge algorithm does not ship. It is the single most important job in this file.
      - run: pnpm test

      # Typing latency and batch-apply scaling. A separate step because it needs the machine to itself:
      # run beside the fuzz test it measures the OS scheduler as much as the code. It asserts scaling laws
      # ("a 10× larger document must not cost 10× more per keystroke"), so it fails on an algorithmic
      # regression rather than on a busy runner.
      - run: pnpm bench

      # Baked into the bundle at BUILD time, not read at runtime — so it has to be present here, and an
      # empty value produces a green build that ships an app pointing at a blank origin. Stored as a
      # repository *secret* rather than a variable: it is not sensitive (the browser sees it), but keeping
      # both namespaces in play is how you end up reading `vars.X` when the value lives in `secrets.X` and
      # silently building with an empty string.
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  deploy:
    name: deploy → Vercel
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-frontend
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Vercel builds and hosts the Next app. It is the one part of this system that genuinely suits
      # serverless: the pages are stateless, and everything stateful — the operation log, the WebSocket
      # relay — lives on the backend precisely because Vercel's functions cannot hold a socket (C10).
      - name: Deploy
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
